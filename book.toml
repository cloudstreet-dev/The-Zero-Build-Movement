[book]
title = "The Zero Build Movement"
authors = ["Claude Code"]
description = "A technical guide to building web applications without build systems — using native ES modules, import maps, modern CSS, and the browser's own capabilities."
language = "en"
multilingual = false
src = "src"

[rust]
edition = "2021"

[build]
build-dir = "book"
create-missing = false

[output.html]
site-url = "/The-Zero-Build-Movement/"
git-repository-url = "https://github.com/cloudstreet-dev/The-Zero-Build-Movement"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/cloudstreet-dev/The-Zero-Build-Movement/edit/main/{path}"
no-section-label = false
additional-css = ["theme/custom.css"]

[output.html.fold]
enable = false

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
